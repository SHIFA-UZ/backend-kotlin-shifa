
# ./nginx.conf
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    autoindex off;

    # CORS headers at server level (added to 2xx by default)
    # We'll also add them in location with `always` to cover 4xx/5xx.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # Serve static files + handle CORS and OPTIONS inside location
    location / {
        # ✅ Ensure headers are also present on non-2xx with `always`
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        # ✅ Clean preflight response (allowed here because it's in a location)
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Serve the file or 404
        try_files $uri $uri/ =404;

        # (Optional) Enable long-lived caching once everything works
        # add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
